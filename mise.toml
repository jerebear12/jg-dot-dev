[tools]
aube = "latest"

disable_tools = ["dotnet"]

[tasks.copy-alpine]
description = "Copy Alpine.js from node_modules to wwwroot for self-hosting"
run = '''
set -e
SRC="node_modules/alpinejs/dist/cdn.min.js"
DEST="wwwroot/js/alpine.js"

if [ ! -f "$SRC" ]; then
    echo "Error: $SRC not found. Run 'aube add alpinejs && aube install' first."
    exit 1
fi

cp "$SRC" "$DEST"
echo "Copied Alpine.js to $DEST"
'''

[tasks.watch-css]
description = "Watch and rebuild UnoCSS styles"
run = "unocss --watch"

[tasks.watch-dotnet]
description = "Run ASP.NET Core in watch mode"
run = "dotnet watch"

[tasks.dev]
description = "Run CSS and .NET watchers in parallel"
run = '''
unocss --watch &
UNOCSS_PID=$!
dotnet watch
kill $UNOCSS_PID 2>/dev/null
'''
