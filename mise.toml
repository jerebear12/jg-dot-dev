[tools]
aube = "latest"

disable_tools = ["dotnet"]

[tasks.copy-alpine]
description = "Copy Alpine.js from node_modules to wwwroot for self-hosting"
run = '''
set -e
SRC="node_modules/alpinejs/dist/cdn.min.js"
DEST="wwwroot/js/alpine.js"

if [ ! -f "$SRC" ]; then
    echo "Error: $SRC not found. Run 'aube add alpinejs && aube install' first."
    exit 1
fi

cp "$SRC" "$DEST"
echo "Copied Alpine.js to $DEST"
'''

[tasks.copy-reset]
description = "Copy UnoCSS Tailwind reset from node_modules to wwwroot"
run = '''
set -e
SRC="node_modules/@unocss/reset/tailwind.css"
DEST="wwwroot/css/reset.css"

if [ ! -f "$SRC" ]; then
    echo "Error: $SRC not found. Run 'aube add @unocss/reset && aube install' first."
    exit 1
fi

cp "$SRC" "$DEST"
echo "Copied UnoCSS reset to $DEST"
'''

[tasks.copy-htmz]
description = "Copy HTMZ from node_modules to wwwroot for self-hosting"
run = '''
set -e
SRC="Presentation/node_modules/htmz/index.js"
DEST="Presentation/wwwroot/js/htmz.js"

if [ ! -f "$SRC" ]; then
    echo "Error: $SRC not found. Run 'aube add -D htmz && aube install' first."
    exit 1
fi

SNIPPET=$(sed -n 's/.*\[`\([^`]*\)`\].*/\1/p' "$SRC")
if [ -z "$SNIPPET" ]; then
    echo "Error: Could not extract HTMZ snippet from $SRC"
    exit 1
fi

echo "document.body.insertAdjacentHTML('beforeend', '${SNIPPET}');" > "$DEST"
echo "Copied HTMZ to $DEST"
'''

[tasks.watch-css]
description = "Watch and rebuild UnoCSS styles"
run = "unocss --watch"

[tasks.watch-dotnet]
description = "Run ASP.NET Core in watch mode"
run = "dotnet watch --project \"API/API.csproj\""

[tasks.dev]
description = "Run CSS and .NET watchers in parallel"
run = '''
cd Presentation && aube run unocss --watch &
UNOCSS_PID=$!
dotnet watch --project "API/API.csproj"
kill $UNOCSS_PID 2>/dev/null
'''
